sonar.projectKey=steadybit_extension-azure
sonar.organization=steadybit

sonar.sources=.
sonar.exclusions=**/*_test.go
sonar.tests=.
sonar.test.inclusions=**/*_test.go

sonar.go.coverage.reportPaths=coverage.out,e2e/e2e-coverage-docker.out

# Discovery files are thin Azure SDK adapters whose attribute lists must mirror
# the SDK shapes across services — duplication between them is by design.
# Verified end-to-end via the e2e tests + the weekly run in integration-tests,
# not via unit mocks here.
sonar.cpd.exclusions=**/*_discovery.go,extaks/common.go,extvmss/common.go,extvm/common.go
sonar.coverage.exclusions=**/*_discovery.go,main.go,e2e/**

sonar.issue.ignore.multicriteria=test
sonar.issue.ignore.multicriteria.test.ruleKey=go:S1313
sonar.issue.ignore.multicriteria.test.resourceKey=**/*_test.go
