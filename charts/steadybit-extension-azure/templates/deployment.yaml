apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "extensionlib.names.fullname" . }}
  namespace: {{ .Release.Namespace }}
  {{ if .Values.deploymentAnnotations }}
  annotations:
    {{- with .Values.deploymentAnnotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- end }}
  labels:
  {{- range $key, $value := .Values.extraLabels }}
    {{ $key }}: {{ $value }}
  {{- end }}
  {{- include "extensionlib.labels" (list .) | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "extensionlib.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "extensionlib.selectorLabels" . | nindent 8 }}
        {{- include "extensionlib.labels" (list .) | nindent 8 }}
        {{- range $key, $value := .Values.extraLabels }}
        {{ $key }}: {{ $value }}
        {{- end }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        oneagent.dynatrace.com/injection: "false"
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with (.Values.priorityClassName | default (dig "priorityClassName" nil (.Values.global | default dict))) }}
      priorityClassName: {{ . }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
      {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- include "extensionlib.imagePullSecrets" . | nindent 6 }}
      containers:
        - image: {{ include "extensionlib.image" . }}
          imagePullPolicy: {{ include "extensionlib.imagePullPolicy" . }}
          name: extension
          resources:
            requests:
              memory: {{ .Values.resources.requests.memory }}
              cpu: {{ .Values.resources.requests.cpu }}
            limits:
              memory: {{ .Values.resources.limits.memory }}
              cpu: {{ .Values.resources.limits.cpu }}
          env:
            - name: AZURE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ include "azure.secret.name" . }}
                  key: clientID
            - name: AZURE_TENANT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ include "azure.secret.name" . }}
                  key: tenantID
            - name: AZURE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "azure.secret.name" . }}
                  key: clientSecret
                  optional: true
            - name: AZURE_SUBSCRIPTION_ID
              valueFrom:
                secretKeyRef:
                  name: {{ include "azure.secret.name" . }}
                  key: subscriptionID
                  optional: true
            - name: STEADYBIT_EXTENSION_AZURE_CERTIFICATE_PATH
              valueFrom:
                secretKeyRef:
                  name: {{ include "azure.secret.name" . }}
                  key: certificatePath
                  optional: true
            - name: STEADYBIT_EXTENSION_AZURE_CERTIFICATE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "azure.secret.name" . }}
                  key: certificatePassword
                  optional: true
            - name: STEADYBIT_EXTENSION_AZURE_USER_ASSERTION_STRING
              valueFrom:
                secretKeyRef:
                  name: {{ include "azure.secret.name" . }}
                  key: userAssertionString
                  optional: true
            {{- if .Values.discovery.attributes.excludes.scaleSetInstance }}
            - name: STEADYBIT_EXTENSION_DISCOVERY_ATTRIBUTES_EXCLUDES_SCALE_SET_INSTANCE
              value: {{ join "," .Values.discovery.attributes.excludes.scaleSetInstance | quote }}
            {{- end }}
            {{- if .Values.discovery.attributes.excludes.vm }}
            - name: STEADYBIT_EXTENSION_DISCOVERY_ATTRIBUTES_EXCLUDES_VM
              value: {{ join "," .Values.discovery.attributes.excludes.vm | quote }}
            {{- end }}
            {{- if .Values.discovery.attributes.excludes.azureFunction }}
            - name: STEADYBIT_EXTENSION_DISCOVERY_ATTRIBUTES_EXCLUDES_APP_CONFIGURATION
              value: {{ join "," .Values.discovery.attributes.excludes.appConfiguration | quote }}
            {{- end }}
            {{- if .Values.discovery.attributes.excludes.networkSecurityGroup }}
            - name: STEADYBIT_EXTENSION_DISCOVERY_ATTRIBUTES_EXCLUDES_NETWORK_SECURITY_GROUP
              value: {{ join "," .Values.discovery.attributes.excludes.networkSecurityGroup | quote }}
            {{- end }}
            - name: STEADYBIT_EXTENSION_DISCOVERY_ENABLE_VIRTUAL_MACHINES
              value: "{{ if .Values.discovery.enable.vm }}true{{ else }}false{{ end }}"
            - name: STEADYBIT_EXTENSION_DISCOVERY_ENABLE_SCALE_INSTANCES
              value: "{{ if .Values.discovery.enable.scaleSetInstance }}true{{ else }}false{{ end }}"
            - name: STEADYBIT_EXTENSION_DISCOVERY_ENABLE_CONTAINER_APPS
              value: "{{ if .Values.discovery.enable.containerApp }}true{{ else }}false{{ end }}"
            - name: STEADYBIT_EXTENSION_DISCOVERY_ENABLE_NETWORK_SECURITY_GROUPS
              value: "{{ if .Values.discovery.enable.networkSecurityGroup }}true{{ else }}false{{ end }}"
            - name: STEADYBIT_EXTENSION_DISCOVERY_ENABLE_AZURE_FUNCTIONS
              value: "{{ if .Values.discovery.enable.azureFunction }}true{{ else }}false{{ end }}"
            - name: STEADYBIT_EXTENSION_DISCOVERY_ENABLE_AKS_CLUSTER
              value: "{{ if .Values.discovery.enable.aksCluster }}true{{ else }}false{{ end }}"
            - name: STEADYBIT_EXTENSION_DISCOVERY_ENABLE_AKS_NODE_POOL
              value: "{{ if .Values.discovery.enable.aksNodePool }}true{{ else }}false{{ end }}"
            - name: STEADYBIT_EXTENSION_DISCOVERY_ENABLE_SCALE_SET
              value: "{{ if .Values.discovery.enable.scaleSet }}true{{ else }}false{{ end }}"
            - name: STEADYBIT_EXTENSION_DISCOVERY_ENABLE_MANAGED_DISK
              value: "{{ if .Values.discovery.enable.managedDisk }}true{{ else }}false{{ end }}"
            - name: STEADYBIT_EXTENSION_DISCOVERY_ENABLE_NAT_GATEWAY
              value: "{{ if .Values.discovery.enable.natGateway }}true{{ else }}false{{ end }}"
            - name: STEADYBIT_EXTENSION_DISCOVERY_ENABLE_COSMOS_DB
              value: "{{ if .Values.discovery.enable.cosmosDb }}true{{ else }}false{{ end }}"
            - name: STEADYBIT_EXTENSION_DISCOVERY_ENABLE_EVENT_GRID
              value: "{{ if .Values.discovery.enable.eventGrid }}true{{ else }}false{{ end }}"
            - name: STEADYBIT_EXTENSION_DISCOVERY_ENABLE_SERVICE_BUS
              value: "{{ if .Values.discovery.enable.serviceBus }}true{{ else }}false{{ end }}"
            - name: STEADYBIT_EXTENSION_DISCOVERY_ENABLE_STORAGE_QUEUE
              value: "{{ if .Values.discovery.enable.storageQueue }}true{{ else }}false{{ end }}"
            - name: STEADYBIT_EXTENSION_DISCOVERY_ENABLE_LOAD_BALANCER
              value: "{{ if .Values.discovery.enable.loadBalancer }}true{{ else }}false{{ end }}"
            - name: STEADYBIT_EXTENSION_DISCOVERY_ENABLE_APPLICATION_GATEWAY
              value: "{{ if .Values.discovery.enable.applicationGateway }}true{{ else }}false{{ end }}"
            - name: STEADYBIT_EXTENSION_DISCOVERY_ENABLE_API_MANAGEMENT
              value: "{{ if .Values.discovery.enable.apiManagement }}true{{ else }}false{{ end }}"
            {{- include "extensionlib.deployment.env" (list .) | nindent 12 }}
            {{- with .Values.extraEnv }}
              {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.extraEnvFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            {{- include "extensionlib.deployment.volumeMounts" (list .) | nindent 12 }}
          livenessProbe:
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.liveness.timeoutSeconds }}
            successThreshold: {{ .Values.probes.liveness.successThreshold }}
            failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
            httpGet:
              path: /health/liveness
              port: 8081
          readinessProbe:
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.readiness.timeoutSeconds }}
            successThreshold: {{ .Values.probes.readiness.successThreshold }}
            failureThreshold: {{ .Values.probes.readiness.failureThreshold }}
            httpGet:
              path: /health/readiness
              port: 8081
          {{- with .Values.containerSecurityContext }}
          securityContext:
          {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        {{- include "extensionlib.deployment.volumes" (list .) | nindent 8 }}
      serviceAccountName: {{ .Values.serviceAccount.name }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
      {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
      {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
      {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.topologySpreadConstraints }}
      topologySpreadConstraints:
      {{- toYaml . | nindent 8 }}
      {{- end }}
